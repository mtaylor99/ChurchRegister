name: Playwright E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20.x"
  API_PORT: 5502

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET setup ────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        run: dotnet restore

      # ── Node / npm setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./ChurchRegister.React/package-lock.json"

      - name: Install npm dependencies
        working-directory: ./ChurchRegister.React
        run: npm ci

      # ── Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright Chromium browser
        working-directory: ./ChurchRegister.React
        run: npx playwright install chromium --with-deps

      # ── Write .env.test ───────────────────────────────────────────────────
      - name: Create .env.test from secrets
        working-directory: ./ChurchRegister.React
        run: |
          cat > .env.test << EOF
          PLAYWRIGHT_BASE_URL=http://localhost:3000
          PLAYWRIGHT_API_URL=http://localhost:${{ env.API_PORT }}
          TEST_ADMIN_EMAIL=${{ secrets.E2E_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          EOF

      # ── Start API in background ───────────────────────────────────────────
      - name: Start API service
        run: |
          dotnet run \
            --project ChurchRegister.ApiService/ChurchRegister.ApiService.csproj \
            --configuration Release \
            --launch-profile https &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait for the API to be ready
          timeout 60 bash -c 'until curl -sf http://localhost:${{ env.API_PORT }}/health; do sleep 2; done'

      # ── Run Playwright (webServer config starts the React dev server) ─────
      - name: Run Playwright E2E tests
        working-directory: ./ChurchRegister.React
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:${{ env.API_PORT }}
          TEST_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npx playwright test --project=chromium --reporter=github,html

      # ── Upload report on failure ──────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ChurchRegister.React/playwright-report/
          retention-days: 14
